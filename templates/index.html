<!DOCTYPE html>
<html>
<head>
  <title>Local Llama Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Markdown formatter -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #212121;
      color: #ececec;
      margin: 0;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 260px;
      background: #171717;
      padding: 20px;
      border-right: 1px solid #2f2f2f;
      overflow-y: auto;
    }

    .sidebar h2 {
      margin-top: 0;
      font-size: 22px;
      color: #ececec;
    }

    .new-chat {
      width: 100%;
      padding: 12px;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      background: #212121;
      color: #ececec;
      cursor: pointer;
      margin-top: 20px;
      font-size: 15px;
    }

    .new-chat:hover {
      background: #2f2f2f;
    }

    .status {
      margin-top: 20px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(16, 185, 129, 0.12);
      color: #6ee7b7;
      font-size: 14px;
    }

    .chat-history-title {
      margin-top: 25px;
      margin-bottom: 10px;
      font-size: 14px;
      color: #9ca3af;
    }

    .chat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 10px;
      background: transparent;
      color: #d1d5db;
      cursor: pointer;
      font-size: 14px;
    }

    .chat-item:hover {
      background: #2f2f2f;
    }

    .chat-item.active {
      background: #2f2f2f;
      color: #ffffff;
    }

    .chat-title {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .delete-chat {
      background: transparent;
      color: #a3a3a3;
      border: none;
      cursor: pointer;
      font-size: 15px;
      padding: 2px 6px;
    }

    .delete-chat:hover {
      color: #ef4444;
      background: transparent;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #212121;
    }

    .header {
      padding: 20px 30px;
      background: #212121;
      border-bottom: 1px solid #2f2f2f;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      color: #ececec;
    }

    .header p {
      margin: 5px 0 0;
      color: #9ca3af;
      font-size: 14px;
    }

    .model-box {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .model-box label {
      font-size: 14px;
      color: #b4b4b4;
    }

    .model-box select {
      background: #2f2f2f;
      color: #ececec;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      padding: 8px 12px;
      outline: none;
      cursor: pointer;
      font-size: 14px;
    }

    .model-box select:focus {
      border-color: #565656;
    }

    #chat {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #212121;
    }

    .msg {
      width: 100%;
      max-width: 850px;
      padding: 0;
      line-height: 1.6;
      animation: fadeIn 0.25s ease;
      overflow-wrap: break-word;
    }

    .user {
      background: #2f2f2f;
      color: #ececec;
      display: inline-block;
      max-width: 40%;
      padding: 10px 16px;
      border-radius: 18px;
      margin-top: 40px;
      margin-bottom: 40px;
      margin-left: auto;
      margin-right: 120px;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
      box-shadow: none;
    }

    .ai {
      background: transparent;
      border: none;
      color: #ececec;
      max-width: 850px;
      width: 100%;
      border-radius: 0;
      margin-bottom: 32px;
    }

    .sender {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #b4b4b4;
      letter-spacing: 0.2px;
    }

    .ai-content {
      font-size: 16px;
      line-height: 1.75;
      color: #ececec;
    }

    .ai-content > *:first-child {
      margin-top: 0;
    }

    .ai-content > *:last-child {
      margin-bottom: 0;
    }

    .ai-content h1,
    .ai-content h2,
    .ai-content h3 {
      color: #ececec;
      font-weight: 700;
      line-height: 1.35;
      margin: 22px 0 10px;
    }

    .ai-content h1 {
      font-size: 28px;
    }

    .ai-content h2 {
      font-size: 23px;
    }

    .ai-content h3 {
      font-size: 19px;
    }

    .ai-content p {
      margin: 12px 0;
    }

    .ai-content ul,
    .ai-content ol {
      margin: 12px 0;
      padding-left: 28px;
    }

    .ai-content li {
      margin: 6px 0;
    }

    .ai-content li p {
      margin: 4px 0;
    }

    .ai-content strong {
      color: #ffffff;
      font-weight: 700;
    }

    .ai-content em {
      color: #cfcfcf;
    }

    .ai-content code {
      background: #2f2f2f;
      color: #f5f5f5;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: Consolas, Monaco, monospace;
      font-size: 14px;
    }

    .ai-content pre {
      background: #171717;
      color: #ececec;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 16px 0;
      border: 1px solid #3a3a3a;
    }

    .ai-content pre code {
      background: transparent;
      padding: 0;
      color: inherit;
      font-size: 14px;
      line-height: 1.6;
    }

    .ai-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }

    .ai-content th,
    .ai-content td {
      border: 1px solid #3a3a3a;
      padding: 10px 12px;
      text-align: left;
    }

    .ai-content th {
      background: #2f2f2f;
      color: #ffffff;
      font-weight: 700;
    }

    .ai-content blockquote {
      border-left: 4px solid #6b7280;
      padding-left: 14px;
      margin: 16px 0;
      color: #cfcfcf;
    }

    .ai-content a {
      color: #8ab4f8;
      text-decoration: underline;
    }

    .typing {
      color: #9ca3af;
      font-style: italic;
      margin-top: 10px;
    }

    #inputArea {
      display: flex;
      gap: 12px;
      padding: 20px 30px;
      background: #212121;
      border-top: 1px solid #2f2f2f;
    }

    input {
      flex: 1;
      padding: 15px;
      border: 1px solid #3a3a3a;
      border-radius: 15px;
      outline: none;
      background: #2f2f2f;
      color: #ececec;
      font-size: 16px;
    }

    input:focus {
      border-color: #565656;
      background: #303030;
    }

    input::placeholder {
      color: #9ca3af;
    }

    button {
      padding: 0 22px;
      background: #ececec;
      border: none;
      color: #171717;
      cursor: pointer;
      border-radius: 15px;
      font-size: 15px;
      font-weight: bold;
    }

    button:hover {
      background: #d4d4d4;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .user {
        max-width: 70%;
        margin-right: 0;
      }

      .ai {
        max-width: 100%;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .header {
        padding: 16px 20px;
      }

      #chat {
        padding: 20px;
      }

      #inputArea {
        padding: 15px;
      }
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>🧠 LlamaBot</h2>
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
    <div class="status" id="modelStatus">
       Local Llama 3 Active
    </div>

    <div class="chat-history-title">Previous Chats</div>
    <div id="chatHistory"></div>
  </div>

  <div class="main">
    <div class="header">
      <h1>Local AI Assistant</h1>
      <p>Private chatbot powered by your local Llama 3 model</p>

      <div class="model-box">
        <label for="modelSelect">Model:</label>
        <select id="modelSelect">
          <option value="llama3">Llama 3</option>
          <option value="mistral">Mistral</option>
          <option value="qwen2.5:7b">Qwen 2.5</option>
        </select>
      </div>
    </div>

    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Message your local AI..." onkeydown="handleEnter(event)" />
      <button onclick="send()">Send</button>
    </div>
  </div>

<script>
let chats = JSON.parse(localStorage.getItem("llamaChats")) || [];
let currentChatId = null;
let messages = [];

// Configure marked for better line breaks
marked.setOptions({
    breaks: true,
    gfm: true
});

function escapeHTML(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

function renderMarkdown(text) {
    return marked.parse(text || "");
}

window.onload = function () {
    if (chats.length === 0) {
        newChat();
    } else {
        currentChatId = chats[0].id;
        messages = chats[0].messages;
        loadChat(currentChatId);
    }

    renderChatHistory();
};

const modelSelect = document.getElementById("modelSelect");
const modelStatus = document.getElementById("modelStatus");

modelSelect.addEventListener("change", () => {
    const selectedModel = modelSelect.value;

    let modelName = selectedModel;

    if (selectedModel === "llama3") {
        modelName = "Llama 3";
    } else if (selectedModel === "mistral") {
        modelName = "Mistral";
    } else if (selectedModel === "qwen2.5:7b") {
        modelName = "Qwen 2.5";
    }

    modelStatus.textContent = `Local ${modelName} Active`;
});

async function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";

    messages.push({ role: "user", content: text });
    addMessage("You", text, "user");

    updateCurrentChatTitle(text);
    saveCurrentChat();

    const aiDiv = document.createElement("div");
    aiDiv.className = "msg ai";
    const selectedModel = document.getElementById("modelSelect").value;
    aiDiv.innerHTML = `
    <span class="sender">AI · ${selectedModel}</span>
     <div class="ai-content"><span class="typing">Typing...</span></div>
    `;
    document.getElementById("chat").appendChild(aiDiv);
    aiDiv.scrollIntoView();

    try {
        const res = await fetch("http://127.0.0.1:5000/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                messages: messages,
                model: document.getElementById("modelSelect").value
            })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        let fullReply = "";
        let firstChunk = true;

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            fullReply += chunk;

            if (firstChunk) {
                aiDiv.innerHTML = `
                  <span class="sender">AI · ${selectedModel}</span>
                  <div class="ai-content"></div>
            `;
                firstChunk = false;
            }

            const contentDiv = aiDiv.querySelector(".ai-content");
            contentDiv.innerHTML = renderMarkdown(fullReply);
            aiDiv.scrollIntoView();
        }

        messages.push({ role: "assistant", content: fullReply });
        saveCurrentChat();

    } catch (error) {
        aiDiv.innerHTML = `<span class="sender">AI</span>Error: Could not connect to local Llama 3 server.`;
    }
}

function addMessage(sender, text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;

    if (type === "ai") {
        div.innerHTML = `
            <span class="sender">${sender}</span>
            <div class="ai-content">${renderMarkdown(text)}</div>
        `;
    } else {
        div.innerHTML = `
            <span class="sender">${sender}</span>
            ${escapeHTML(text)}
        `;
    }

    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
}

function handleEnter(event) {
    if (event.key === "Enter") {
        send();
    }
}

function newChat() {
    const newChatObj = {
        id: Date.now(),
        title: "New Chat",
        messages: []
    };

    chats.unshift(newChatObj);
    currentChatId = newChatObj.id;
    messages = [];

    document.getElementById("chat").innerHTML = `
      <div class="msg ai">
        <span class="sender">AI</span>
        <div class="ai-content">New chat started. How can I help?</div>
      </div>
    `;

    saveChats();
    renderChatHistory();
}

function loadChat(chatId) {
    currentChatId = chatId;

    const selectedChat = chats.find(chat => chat.id === chatId);
    if (!selectedChat) return;

    messages = selectedChat.messages;

    const chatBox = document.getElementById("chat");
    chatBox.innerHTML = "";

    if (messages.length === 0) {
        chatBox.innerHTML = `
          <div class="msg ai">
            <span class="sender">AI</span>
            <div class="ai-content">New chat started. How can I help?</div>
          </div>
        `;
    } else {
        messages.forEach(message => {
            if (message.role === "user") {
                addMessage("You", message.content, "user");
            } else {
                addMessage("AI", message.content, "ai");
            }
        });
    }

    renderChatHistory();
}

function deleteChat(chatId, event) {
    event.stopPropagation();

    chats = chats.filter(chat => chat.id !== chatId);

    if (chats.length === 0) {
        saveChats();
        newChat();
        return;
    }

    if (currentChatId === chatId) {
        currentChatId = chats[0].id;
        messages = chats[0].messages;
        loadChat(currentChatId);
    }

    saveChats();
    renderChatHistory();
}

function renderChatHistory() {
    const chatHistory = document.getElementById("chatHistory");
    chatHistory.innerHTML = "";

    chats.forEach(chat => {
        const chatItem = document.createElement("div");
        chatItem.className = "chat-item";

        if (chat.id === currentChatId) {
            chatItem.classList.add("active");
        }

        chatItem.onclick = function () {
            loadChat(chat.id);
        };

        chatItem.innerHTML = `
          <span class="chat-title">${escapeHTML(chat.title)}</span>
          <button class="delete-chat" onclick="deleteChat(${chat.id}, event)">🗑</button>
        `;

        chatHistory.appendChild(chatItem);
    });
}

function updateCurrentChatTitle(firstMessage) {
    const selectedChat = chats.find(chat => chat.id === currentChatId);

    if (selectedChat && selectedChat.title === "New Chat") {
        selectedChat.title = firstMessage.substring(0, 30);
        renderChatHistory();
    }
}

function saveCurrentChat() {
    const selectedChat = chats.find(chat => chat.id === currentChatId);

    if (selectedChat) {
        selectedChat.messages = messages;
    }

    saveChats();
}

function saveChats() {
    localStorage.setItem("llamaChats", JSON.stringify(chats));
}
</script>

</body>
</html>
