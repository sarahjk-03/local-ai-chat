<!DOCTYPE html>
<html>
<head>
  <title>Local ChatGPT</title>
  <style>
    body {
      font-family: Arial;
      background: #343541;
      color: white;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      max-width: 70%;
    }

    .user {
      background: #2b2c2f;
      align-self: flex-end;
      margin-left: auto;
    }

    .ai {
      background: #444654;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #40414f;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      background: #19c37d;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" placeholder="Message..." />
  <button onclick="send()">Send</button>
</div>

<script>
let messages = [];

async function send() {
    const input = document.getElementById("msg");
    const text = input.value;
    if (!text) return;

    input.value = "";

    messages.push({ role: "user", content: text });

    addMessage("You", text, "user");

    const res = await fetch("http://127.0.0.1:5000/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages })
    });

    const data = await res.json();

    messages.push({ role: "assistant", content: data.reply });

    addMessage("AI", data.reply, "ai");
}

function addMessage(sender, text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = "<b>" + sender + ":</b> " + text;
    document.getElementById("chat").appendChild(div);

    div.scrollIntoView();
}
</script>

</body>
</html>
